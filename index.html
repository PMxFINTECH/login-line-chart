<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Performance Line Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding: 24px;
      max-width: 780px;
      margin: 0 auto;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 16px;
    }
    .metric-card .label { font-size: 13px; color: #888; margin: 0 0 4px; }
    .metric-card .value { font-size: 22px; font-weight: 500; margin: 0; }
    .metric-card .sub   { font-size: 12px; color: #888; margin: 4px 0 0; }
    .section-label {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      margin: 0 0 8px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #555;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .line-swatch { width: 18px; height: 3px; border-radius: 2px; display: inline-block; }
  </style>
</head>
<body>

  <div class="metric-grid">
    <div class="metric-card">
      <p class="label">Revolut median</p>
      <p class="value" id="rev-median">—</p>
      <p class="sub">Range: <span id="rev-range">—</span></p>
    </div>
    <div class="metric-card">
      <p class="label">Wise median</p>
      <p class="value" id="wise-median">—</p>
      <p class="sub">Range: <span id="wise-range">—</span></p>
    </div>
    <div class="metric-card">
      <p class="label">PayPal median</p>
      <p class="value" id="pp-median">—</p>
      <p class="sub">Range: <span id="pp-range">—</span></p>
    </div>
  </div>

  <p class="section-label">All 10 recorded login attempts + median</p>
  <div class="legend">
    <span><span class="line-swatch" style="background:#7F77DD;"></span>Revolut</span>
    <span><span class="line-swatch" style="background:#1D9E75;"></span>Wise</span>
    <span><span class="line-swatch" style="background:#D85A30;"></span>PayPal</span>
    <span style="opacity:0.6;"><span class="line-swatch" style="background:#888; border-top: 2px dashed #888; height:0;"></span>Median</span>
  </div>
  <div style="position: relative; width: 100%; height: 360px;">
    <canvas id="lineChart"></canvas>
  </div>
